<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🔐 Secure Password Generator</h1>
<p>Create strong passwords instantly</p>

<div class="display">
<input type="text" id="password" placeholder="Your Password" readonly>
<button id="copy">Copy</button>
</div>

<div class="controls">

<label>Password Length</label>
<input type="range" min="6" max="30" value="12" id="length">
<span id="lengthValue">12</span>

<div class="options">
<label><input type="checkbox" id="uppercase" checked> Uppercase Letters</label>
<label><input type="checkbox" id="numbers" checked> Numbers</label>
<label><input type="checkbox" id="symbols"> Symbols</label>
</div>

<button id="generate">Generate Password</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
